name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build shm_launcher.exe from source
        run: x86_64-w64-mingw32-gcc -o assets/shm_launcher.exe tools/shm_launcher.c -municode

      - name: Install Fyne build dependencies
        run: |
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Build (Linux)
        env:
          CGO_ENABLED: '1'
        run: go build -tags gui -o /dev/null ./cmd/cluckers

      - name: Build (Windows)
        env:
          CGO_ENABLED: '1'
          GOOS: windows
          CC: x86_64-w64-mingw32-gcc
        run: go build -tags gui -o /dev/null ./cmd/cluckers

      - name: Test
        env:
          CGO_ENABLED: '0'
        run: go test ./...

      - name: Vet (Linux)
        env:
          CGO_ENABLED: '1'
        run: go vet -tags gui ./...

      - name: Vet (Windows)
        env:
          CGO_ENABLED: '1'
          GOOS: windows
          CC: x86_64-w64-mingw32-gcc
        run: go vet -tags gui ./...
