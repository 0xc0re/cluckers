name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build shm_launcher.exe from source
        run: x86_64-w64-mingw32-gcc -o assets/shm_launcher.exe tools/shm_launcher.c -municode

      - name: Build (Linux)
        run: go build -o /dev/null ./cmd/cluckers

      - name: Build (Windows)
        run: GOOS=windows go build -o /dev/null ./cmd/cluckers

      - name: Test
        run: go test ./...

      - name: Vet (Linux)
        run: go vet ./...

      - name: Vet (Windows)
        run: GOOS=windows go vet ./...
