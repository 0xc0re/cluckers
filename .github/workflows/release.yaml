name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Build shm_launcher.exe from source
        run: x86_64-w64-mingw32-gcc -o assets/shm_launcher.exe tools/shm_launcher.c -municode

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Server endpoints — update these repo variables and cut a new tag to change endpoints.
          # Set in: GitHub repo > Settings > Secrets and variables > Actions > Variables tab
          GATEWAY_URL: ${{ vars.GATEWAY_URL || 'https://gateway-dev.project-crown.com' }}
          HOSTX_IP: ${{ vars.HOSTX_IP || '157.90.131.105' }}
