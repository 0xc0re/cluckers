name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Build shm_launcher.exe from source
        run: x86_64-w64-mingw32-gcc -o assets/shm_launcher.exe tools/shm_launcher.c -municode

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Server endpoints — update these repo variables and cut a new tag to change endpoints.
          # Set in: GitHub repo > Settings > Secrets and variables > Actions > Variables tab
          GATEWAY_URL: ${{ vars.GATEWAY_URL || 'https://gateway-dev.project-crown.com' }}
          HOSTX_IP: ${{ vars.HOSTX_IP || '157.90.131.105' }}

      - name: Free disk space for AppImage build
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          df -h /

      - name: Download AppImage tooling
        run: |
          mkdir -p /tmp/appimage-tools
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O /tmp/appimage-tools/linuxdeploy
          chmod +x /tmp/appimage-tools/linuxdeploy
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimage-tools/appimagetool
          chmod +x /tmp/appimage-tools/appimagetool
          wget -q https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64 -O /tmp/appimage-tools/type2-runtime-x86_64
          sudo apt-get install -y zsync
          echo "/tmp/appimage-tools" >> $GITHUB_PATH

      - name: Cache Proton-GE
        uses: actions/cache@v5
        with:
          path: build/appimage/proton-cache
          key: proton-ge-GE-Proton10-32

      - name: Build AppImage
        env:
          VERSION: ${{ github.ref_name }}
          # CI runners lack FUSE -- let AppImage tools extract themselves to run.
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          # Find the Linux binary from goreleaser output
          BINARY=$(find dist/ -name "cluckers" -path "*cluckers-linux*" -not -path "*/cluckers.exe" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: Could not find Linux binary in dist/"
            find dist/ -type f -name "cluckers*"
            exit 1
          fi
          echo "Using binary: $BINARY"
          RUNTIME_PATH=/tmp/appimage-tools/type2-runtime-x86_64 ./scripts/build-appimage.sh "$BINARY"

      - name: Upload AppImage to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Append AppImage checksums to goreleaser's checksums.txt
          cd dist
          sha256sum Cluckers-x86_64.AppImage >> checksums.txt
          sha256sum Cluckers-x86_64.AppImage.zsync >> checksums.txt
          cd ..

          # Upload AppImage files and updated checksums
          gh release upload "$TAG_NAME" \
            dist/Cluckers-x86_64.AppImage \
            dist/Cluckers-x86_64.AppImage.zsync \
            dist/checksums.txt \
            --clobber
