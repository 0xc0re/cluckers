version: 2

builds:
  - id: cluckers
    main: ./cmd/cluckers
    binary: cluckers
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: CI/CD
      regexp: '^ci'
      order: 2
    - title: Documentation
      regexp: '^docs'
      order: 3
    - title: Refactoring
      regexp: '^refactor'
      order: 4
    - title: Other
      order: 999
  filters:
    exclude:
      - '^Merge'
      - '^chore'

release:
  github:
    owner: 0xc0re
    name: cluckers
